eyebrow:
  type: text
  comment: Small label shown above the heading.
heading:
  type: text
  comment: Main heading text displayed in the hero.
subtext:
  type: markdown
  comment: Supporting copy beneath the heading.
  options:
    blockquote: false
    bold: true
    format:
    italic: true
    link: true
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: false
    numberedlist: false
rotatingWords:
  type: array
  label: Rotating Words
  comment: Words that cycle in the animated heading.
buttonSections:
  type: array
  label: Buttons
  comment: Call-to-action buttons in the hero.
  options:
    structures: _structures.buttonSections
colorScheme:
  type: select
  comment: Color scheme theme applied to the section.
  options:
    values:
      - id: inherit
        name: Inherit
      - id: light
        name: Light
      - id: dark
        name: Dark
backgroundColor:
  type: select
  comment: Background color used behind the hero.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
paddingVertical:
  type: select
  comment: Vertical padding for the section.
  options:
    values:
      - id: none
        name: None
      - id: sm
        name: Small
      - id: md
        name: Medium
      - id: lg
        name: Large
      - id: xl
        name: Extra Large
      - id: 2xl
        name: 2xl
      - id: 3xl
        name: 3xl
      - id: 4xl
        name: 4xl
      - id: 5xl
        name: 5xl
      - id: 6xl
        name: 6xl
